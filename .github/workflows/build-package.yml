name: Build package to PyPi

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      
jobs:
  download_releases:
    runs-on: ubuntu-latest
    steps:
      - name: download release asset from deterministicGaussianSampling
        uses: robinraju/release-downloader@v1
        with:
          repository: "KIT-ISAS/deterministicGaussianSampling"
          latest: true
          fileName: "*.zip"
          out-file-path: "deterministicGaussianSamplingLibs"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: upload downloaded libs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: deterministicGaussianSampling-libs
          path: deterministicGaussianSamplingLibs

  test:
    needs: download_releases
    strategy:
      matrix:
        os: [
            windows-2025,
            windows-2022,
            windows-2019,
            ubuntu-24.04,
            ubuntu-22.04,
          ] #, macos-14, macos-14-large, macos-15, macos-26]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}

    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: get deterministicGaussianSampling libs
        uses: actions/download-artifact@v4
        with:
          name: deterministicGaussianSampling-libs
          path: external_libs

      - name: extract ZIP on Unix
        if: ${{ runner.os == 'Linux' }}
        run: |
          mkdir -p external_libs_unpacked/linux
          unzip external_libs/linux.zip -d external_libs_unpacked/linux
          mkdir -p src/deterministic_gaussian_sampling/lib/linux/bin
          cp -r external_libs_unpacked/linux/lib/* src/deterministic_gaussian_sampling/lib/linux/bin

      - name: extract ZIP on Windows
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path external_libs_unpacked\windows -Force
          Expand-Archive -Path external_libs/windows.zip -DestinationPath external_libs_unpacked\windows -Force
          New-Item -ItemType Directory -Path src\deterministic_gaussian_sampling\lib\windows\bin -Force
          Copy-Item external_libs_unpacked\windows\bin\* src\deterministic_gaussian_sampling\lib\windows\bin -Recurse -Force

      - name: run tests
        run: |
          pip install -e .
          pip install --upgrade pip
          pip install pytest scipy
          pytest -v

  commit_shared_libs:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - name: checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: download deterministicGaussianSampling libs artifact
        uses: actions/download-artifact@v4
        with:
          name: deterministicGaussianSampling-libs
          path: external_libs

      - name: extract and place shared libraries
        run: |
          set -e

          # Linux libs
          if [ -f external_libs/linux.zip ]; then
            mkdir -p external_libs_unpacked/linux
            unzip -o external_libs/linux.zip -d external_libs_unpacked/linux

            mkdir -p src/deterministic_gaussian_sampling/lib/linux/bin
            cp -r external_libs_unpacked/linux/lib/* \
                  src/deterministic_gaussian_sampling/lib/linux/bin/
          fi

          # Windows libs
          if [ -f external_libs/windows.zip ]; then
            mkdir -p external_libs_unpacked/windows
            unzip -o external_libs/windows.zip -d external_libs_unpacked/windows

            mkdir -p src/deterministic_gaussian_sampling/lib/windows/bin
            cp -r external_libs_unpacked/windows/bin/* \
                  src/deterministic_gaussian_sampling/lib/windows/bin/
          fi

      - name: install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: build package
        run: python -m build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: commit shared libraries
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@isas-packages@iar.kit.edu"

          git add -f src/deterministic_gaussian_sampling/lib

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update deterministicGaussianSampling shared libraries"
            git push
          fi